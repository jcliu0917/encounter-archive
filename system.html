<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Encounter Field</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="system">

<div class="grain"></div>

<div class="header">
  live encounter field / hamburg node
</div>

<div class="flow-note">
  the system is continuously forming itself
</div>

<div id="field"></div>

<script>
const fragments = [
  "light dissolves on water surface — memory becomes unstable",
  "industrial residue near harbor edge — perception slows down",
  "a fragment of plastic, half submerged — unreadable time",
  "walking becomes a scanning process",
  "objects no longer belong to categories",
  "attention shifts before recognition completes",
  "harbor wind reorganizes spatial perception"
];

// 更“艺术”的生成（不是点击，是自动显影）
function spawn() {
  const f = fragments[Math.floor(Math.random() * fragments.length)];

  const el = document.createElement("div");
  el.className = "fragment";

  el.style.left = Math.random() * 70 + "%";
  el.style.top = Math.random() * 80 + "%";
  el.style.opacity = Math.random() * 0.6 + 0.2;

  el.innerText = f;

  document.getElementById("field").appendChild(el);

  // slowly fade out
  setTimeout(() => {
    el.style.opacity = 0;
  }, 8000);

  setTimeout(() => {
    el.remove();
  }, 12000);
}

// 自动生成（不是按钮）
setInterval(spawn, 1800);

// 初始生成
for(let i=0;i<5;i++) spawn();
</script>

</body>
</html>
