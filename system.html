<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Encounter Archive V3</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="system">

<div class="grain"></div>

<div class="ui">
  <div class="title">encounter archive / v3</div>
  <button onclick="toggleMode()">switch mode</button>
</div>

<div id="field"></div>

<script>

let mode = "global";

const globalFragments = [
  "light dissolves into perceptual noise",
  "objects reorganize attention without warning",
  "walking becomes a scanning process",
  "time appears as residue",
  "encounter produces unstable memory"
];

const hamburgFragments = [
  "Elbe river shifts perception of distance",
  "harbor machinery becomes temporal rhythm",
  "water reflects fragmented urban memory",
  "cargo structures reorganize attention",
  "edge of land and water blurs perception"
];

function getFragments(){
  return mode === "hamburg" ? hamburgFragments : globalFragments;
}

function spawn(){
  const fragments = getFragments();
  const text = fragments[Math.floor(Math.random() * fragments.length)];

  const el = document.createElement("div");
  el.className = "fragment";

  el.style.left = Math.random() * 80 + "%";
  el.style.top = Math.random() * 85 + "%";
  el.style.opacity = Math.random() * 0.6 + 0.2;

  el.innerText = text;

  document.getElementById("field").appendChild(el);

  setTimeout(() => {
    el.style.opacity = 0;
  }, 7000);

  setTimeout(() => {
    el.remove();
  }, 11000);
}

function toggleMode(){
  mode = mode === "global" ? "hamburg" : "global";

  // visual reset
  document.getElementById("field").innerHTML = "";

  for(let i=0;i<6;i++) spawn();
}

setInterval(spawn, 2000);

// init
for(let i=0;i<6;i++) spawn();

</script>

</body>
</html>
