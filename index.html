<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Encounter Archive</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="hero">

  <!-- WATER BACKGROUND -->
  <div class="water-layer">
    <canvas id="water"></canvas>
  </div>

  <!-- TEXT CONTENT -->
  <div class="content">

    <div class="label">ENCOUNTER ARCHIVE</div>

    <div class="title">
      you are entering<br>
      a perceptual system
    </div>

    <div class="desc">
      this is not a portfolio<br>
      this is not documentation<br>
      this is not a collection of works<br><br>

      it is a system of encounters<br>
      built through perception, residue, and attention drift
    </div>

    <a class="enter" href="system.html">
      enter encounter archive →
    </a>

  </div>

</div>

<script>
const canvas = document.getElementById("water");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

let mouse = { x: canvas.width/2, y: canvas.height/2 };

window.addEventListener("mousemove", (e) => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});

let points = [];

// water particles
for (let i = 0; i < 120; i++) {
  points.push({
    x: Math.random() * canvas.width * 0.6,
    y: Math.random() * canvas.height,
    vx: 0,
    vy: 0
  });
}

function animate() {

  ctx.fillStyle = "rgba(0,0,0,0.08)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  points.forEach(p => {

    let dx = mouse.x - p.x;
    let dy = mouse.y - p.y;

    let dist = Math.sqrt(dx*dx + dy*dy);

    let force = Math.max(180 - dist, 0) / 180;

    p.vx += dx * force * 0.002;
    p.vy += dy * force * 0.002;

    p.vx *= 0.92;
    p.vy *= 0.92;

    p.x += p.vx;
    p.y += p.vy;

    ctx.beginPath();
    ctx.arc(p.x, p.y, 1.3, 0, Math.PI * 2);

    ctx.fillStyle = "rgba(255,255,255,0.55)";
    ctx.fill();
  });

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
